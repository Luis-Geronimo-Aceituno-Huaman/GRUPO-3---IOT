# mosquitto.conf — Broker MQTT de project_iot_2
# Broker = "central telefónica" que reparte los mensajes entre nodos, cámara,
# gateway y dashboard. Corre en Docker (eclipse-mosquitto:2, ver docker-compose.yml).

# --- Listener TCP plano ---
listener 1883
protocol mqtt

# --- Autenticación: REQUERIDA (con usuario/contraseña) ---
# Ya NO es anónimo: todo cliente (ESP32, gateway, dashboard, tools) debe
# autenticarse. El archivo de claves se crea con mosquitto_passwd y se monta en
# /mosquitto/config/passwd (ver docker-compose.yml). Agregar/cambiar usuarios:
#   docker run --rm -u "$(id -u):$(id -g)" -v "$PWD":/work eclipse-mosquitto:2 \
#       mosquitto_passwd -b /work/passwd <usuario> <clave>
allow_anonymous false
password_file /mosquitto/config/passwd

# --- Persistencia (volumen montado en /mosquitto/data) ---
persistence true
persistence_location /mosquitto/data/
log_dest stdout

# --- WebSockets (opcional: dashboard MQTT-over-WS directo) ---
# listener 9001
# protocol websockets

# --- TLS (producción — pendiente, ver MQTT_SPEC.md §Seguridad) ---
# listener 8883
# cafile   /etc/mosquitto/certs/ca.crt
# certfile /etc/mosquitto/certs/server.crt
# keyfile  /etc/mosquitto/certs/server.key
# require_certificate true
